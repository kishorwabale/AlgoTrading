name: Nifty Pre-Open Auction Update

on:
  schedule:
    # 3:43 UTC = 9:13 AM IST, weekdays only - after the 9:08-9:12 order
    # matching phase concludes, same timing oc_radar_bot.yml already uses
    - cron: "43 3 * * 1-5"
  workflow_dispatch: {}   # manual trigger from Actions tab for testing

jobs:
  send-preopen-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: ./premarket_update

      - name: Send pre-open auction update
        working-directory: ./premarket_update
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DHAN_CLIENT_ID: ${{ secrets.DHAN_CLIENT_ID }}
          DHAN_PIN: ${{ secrets.DHAN_PIN }}
          DHAN_TOTP_SECRET: ${{ secrets.DHAN_TOTP_SECRET }}
        run: python futures_preopen_update.py
